      security:
        - oauth:
            - api:callback:read
    post:
      operationId: AddOrUpdateCallbackSubscription
      summary: Voeg een callback inschrijving toe (of werk bij) voor de huidige client voor een adres.
      description: |-
        De callbackobjecten zullen gefilterd terugkomen, afhankelijk van het client_id dat gebruikt is voor de authenticatie.
        Als er al een inschrijving bestaat voor dit adres dan wordt deze overschreven.
        De inschrijvingen worden vanzelf opgeruimd als ze verlopen.
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackInschrijving'
        '400':
          description: Invalid argument was provided.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InvalidArgumentProblemDetails'
        '401':
          description: Access is unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblemDetails'
        '403':
          description: Access is forbidden.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PermissionsDeniedProblemDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - Callbacks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallbackInschrijving'
        description: De te configureren callback inschrijving.
      security:
        - oauth:
            - api:callback:write
  /callbacks/inschrijvingen/{bagNummeraanduidingId}:
    delete:
      operationId: DeleteNotificationSubscription
      summary: Verwijder de callback inschrijving voor deze client, dit adres en optioneel een geldverstrekker.
      parameters:
        - name: bagNummeraanduidingId
          in: path
          required: true
          description: Het BAG Nummeraanduiding ID waar de callback inschrijving voor geldt.
          schema:
            type: integer
            format: int64
        - name: geldverstrekker
          in: query
          required: false
          description: De naam van de geldverstrekker waar de callback inschrijving voor geldt.
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Access is unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblemDetails'
        '403':
          description: Access is forbidden.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PermissionsDeniedProblemDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundProblemDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - Callbacks
      security:
        - oauth:
            - api:callback:write
    get:
      operationId: GetNotificationSubscription
      summary: Haal de callback inschrijving op voor deze client, dit adres en eventueel opgegeven geldverstrekker.
      description: Het callbackobject zal gefilterd terugkomen, afhankelijk van het client_id dat gebruikt is voor de authenticatie.
      parameters:
        - name: bagNummeraanduidingId
          in: path
          required: true
          description: Het BAG Nummeraanduiding ID waar de callback inschrijving voor geldt.
          schema:
            type: integer
            format: int64
        - name: geldverstrekker
          in: query
          required: false
          description: De naam van de geldverstrekker waar de callback inschrijving voor geldt.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackInschrijving'
        '401':
          description: Access is unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblemDetails'
        '403':
          description: Access is forbidden.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PermissionsDeniedProblemDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundProblemDetails'
        default:
