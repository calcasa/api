        factuurnummer:
          type: string
          description: Het factuurnummer van de factuur.
    FileContentError:
      type: object
      required:
        - index
        - name
        - expectedContentHash
        - expectedFileSize
        - actualContentHash
        - actualFileSize
      properties:
        index:
          type: integer
          format: int32
        name:
          type: string
          example: data.csv
        expectedContentHash:
          type: string
          pattern: ^[A-F0-9]{64}$
          format: hex
          description: The expected SHA256 hash of the file contents, represented as an uppercase hexadecimal string.
          example: E3B0C44298FC1C149AFBF4C8996FB92427AE41E4649B934CA495991B7852B855
        expectedFileSize:
          type: integer
          format: int64
          description: The expected file size in bytes.
        actualContentHash:
          type: string
          pattern: ^[A-F0-9]{64}$
          format: hex
          description: The actual SHA256 hash of the file contents, represented as an uppercase hexadecimal string.
          example: E3B0C44298FC1C149AFBF4C8996FB92427AE41E4649B934CA495991B7852B855
        actualFileSize:
          type: integer
          format: int64
          description: The actual file size in bytes.
    FileInfo:
      type: object
      required:
        - index
        - name
        - contentHash
        - size
        - contentType
      properties:
        index:
          type: integer
          format: int32
          description: The index of the file within the file set. Zero-based.
        name:
          type: string
          description: The name of the file, including its extension. This needs to be unique within the file set.
          example: data.csv
        contentHash:
          type: string
          pattern: ^[A-F0-9]{64}$
          format: hex
          description: The SHA256 hash of the file contents, represented as an uppercase hexadecimal string. For the outbound file sets this is the expected hash, for inbound file sets this is the actual hash of the file contents.
          example: E3B0C44298FC1C149AFBF4C8996FB92427AE41E4649B934CA495991B7852B855
        size:
          type: integer
          format: int64
          description: The file size in bytes. For the outbound file sets this is the expected size, for inbound file sets this is the actual size of the file contents.
        contentType:
          type: string
          description: |-
            The content type of the file, which indicates the media type of the file contents. This is used to determine how to handle and process the file. For example, "application/pdf" for PDF files, "image/jpeg" for JPEG images, etc.
            Refer to [IANA Media Types](https://www.iana.org/assignments/media-types/media-types.xhtml) for possible values.
    FileNotice:
      type: object
      required:
        - index
        - name
        - type
        - description
      properties:
        index:
          type: integer
          format: int32
        name:
          type: string
          example: data.csv
        type:
          type: string
          description: The type of the warning. Short mostly stable strings that can be used to identify the warning type.
        description:
          type: string
          description: A description of the warning to be presented to the user.
    FileSet:
      type: object
      required:
        - id
        - createdOn
        - modifiedOn
        - type
        - revision
      properties:
        id:
          type: string
          format: uuid
          description: |-
            The file set ID, which is a unique identifier for the file set. This ID is used to track and manage the file set throughout its lifecycle.
            It is generated by the system when the file set is created and is used in API requests to reference the specific file set.
          readOnly: true
        createdOn:
          type: string
          format: date-time
          example: '2021-04-28T12:34:45Z'
          readOnly: true
        expiresAfter:
          type: string
          format: date-time
          nullable: true
          description: If specified, the file set will expire after this date and time. If no appropriate action is taken before this date and time, the file set and all its contents will be deleted.
          example: '2021-04-28T12:34:45Z'
          readOnly: true
        modifiedOn:
          type: string
          format: date-time
          example: '2021-04-28T12:34:45Z'
          readOnly: true
        type:
          type: string
          description: |-
            The type of the file set.
            This value should be constant for a given type of file set and should be agreed upon with Calcasa before use. It is used to ensure that the correct processing logic is applied to the file set based on its intended purpose.  The tuple type, revision and period should always be unique.
        revision:
          type: integer
          format: int32
          description: A revision number for the file set that is incremented for every retry or redelivery. The tuple type, revision and period should always be unique.
        period:
          type: string
          format: date
          nullable: true
          description: |-
            The period of the inbound file set. This is a string that represents the time period for which the file set is relevant. It is used to categorize and identify the time frame of the data contained in the file set.
            The first day of the period is used when the period is a year, quarter or month. For example use the first of April for Q2. The period is represented in the format YYYY-MM-DD, where YYYY is the year, MM is the month, and DD is the day.
            If the period is not applicable, it can be set to null, only do this after consulting with Calcasa.
            The tuple type, revision and period should always be unique.
          example: '2021-04-28'
    FileSetLimits:
      type: object
      required:
        - inboundMaxTotalSizeInKiloBytes
        - inboundMaxFileSizeInKiloBytes
        - inboundMaxCompressedChunkSizeInKiloBytes
        - inboundMaxTotalFiles
        - inboundTtlInSeconds
        - outboundTtlInSeconds
      properties:
        inboundMaxTotalSizeInKiloBytes:
          type: integer
          format: int64
          description: The maximum total size of all files in an inbound file set, in kilobytes (1000 bytes). This limit ensures that the combined size of all files within a file set does not exceed a certain threshold, which helps manage storage and processing resources.
        inboundMaxFileSizeInKiloBytes:
          type: integer
          format: int64
          description: The maximum size of a single file in an inbound file set, in kilobytes (1000 bytes). This limit ensures that individual files do not exceed a certain size, which helps manage storage and processing resources.
        inboundMaxCompressedChunkSizeInKiloBytes:
          type: integer
          format: int64
          description: The maximum size of a compressed chunk in an inbound file set, in kilobytes (1000 bytes). This limit ensures that individual compressed chunks do not exceed a certain size, which helps manage storage and processing resources.
        inboundMaxTotalFiles:
          type: integer
          format: int32
          description: The maximum number of files in an inbound file set. This limit ensures that the number of files within a file set does not exceed a certain threshold, which helps manage storage and processing resources.
        inboundTtlInSeconds:
