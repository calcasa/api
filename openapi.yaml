  /file-sets/inbound:
    post:
      operationId: CreateInboundFileSet
      summary: Create a new inbound file set.
      description: |-
        Create a new inbound file set and all its included files. If the type, period, and revision combination already exists, an InboundFileSetAlreadyExistsProblemDetails will be returned. If the file set is not confirmed within 24 hours, it will expire and all its uploaded contents will be deleted.

        ### Callbacks
        | Name | Url | Schema |
        | --- | --- | --- |
        | inbound-file-set | {configuredWebhookUrl}inbound-file-set | [InboundFileSetWebhookPayload](/api/v1/reference/schemas/InboundFileSetWebhookPayload) |
        | outbound-file-set | {configuredWebhookUrl}outbound-file-set | [OutboundFileSetWebhookPayload](/api/v1/reference/schemas/OutboundFileSetWebhookPayload) |
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundFileSet'
        '400':
          description: Invalid argument was provided.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InvalidArgumentProblemDetails'
        '401':
          description: Access is unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblemDetails'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InboundFileSetAlreadyExistsProblemDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - FileSets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInboundFileSetRequest'
      security:
        - oauth:
            - api:file-set:inbound:write
    get:
      operationId: GetInboundFileSets
      summary: Get all inbound file sets.
      description: This will not include the file details, only the metadata of the file set. Use the GetInboundFileSetById operation to get the details of a specific file set.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InboundFileSet'
        '401':
          description: Access is unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblemDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - FileSets
      security:
        - oauth:
            - api:file-set:inbound:read
  /file-sets/inbound/{inboundFileSetId}:
    get:
      operationId: GetInboundFileSetById
      summary: Get a specific inbound file set by its ID.
      parameters:
        - name: inboundFileSetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundFileSet'
        '401':
          description: Access is unauthorized.
