      security:
        - oauth:
            - api:bestemmingsplannen:read
  /bodem/{bagNummeraanduidingId}:
    get:
      operationId: GetBodemById
      summary: Gegevens over de bodemkwaliteit op de locatie van een adres (BAG Nummeraanduiding ID).
      description: Het bodemdataobject zal gefilterd terugkomen, afhankelijk van het client_id dat gebruikt is voor de authenticatie.
      parameters:
