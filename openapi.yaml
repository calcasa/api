  /callbacks/inschrijvingen:
    get:
      operationId: GetNotificationSubscriptions
      summary: Haal de callback inschrijvingen binnen voor deze client.
      description: De callbackobjecten zullen gefilterd terugkomen, afhankelijk van het client_id dat gebruikt is voor de authenticatie.
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CallbackInschrijving'
        '401':
          description: Access is unauthorized.
