      security:
        - oauth:
            - api:configuratie:read
    post:
      operationId: PostCallbackAuthentication
      summary: Update de geconfigureerde callback authenticatie voor de huidige client.
      description: Het callback-authenticatieobject zal gefilterd terugkomen, afhankelijk van het client_id dat gebruikt is voor de authenticatie.
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackAuthentication'
        '400':
          description: Invalid argument was provided.
          content:
            application/problem+json:
