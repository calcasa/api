openapi: 3.0.0
info:
  title: Calcasa Public API
  contact:
    url: https://www.calcasa.nl/contact
    email: info@calcasa.nl
  license:
    name: Apache License 2.0
    url: https://spdx.org/licenses/Apache-2.0.html
  termsOfService: https://calcasa.nl/gebruiksvoorwaarden
  description: |-
    The Calcasa API is used to connect to Calcasa provided services.
    For more information, please visit [Documentation](https://docs.calcasa.nl) or [GitHub](https://github.com/calcasa/api).
  version: 1.6.0-beta7
tags:
  - name: Adressen
  - name: Bestemmingsplannen
  - name: Bodem
  - name: Buurt
  - name: Callbacks
  - name: Configuratie
  - name: Facturen
  - name: FileSets
  - name: Fotos
  - name: Funderingen
  - name: Geldverstrekkers
  - name: Rapporten
  - name: Waarderingen
paths:
  /adressen/zoeken:
    post:
      operationId: SearchAdres
      summary: Zoek adresinformatie op basis van het opgegeven adres.
      description: |-
        De notities geven aan of de input al dan niet gewijzigd of onbekend is.
        De enige velden die echt nodig zijn voor een compleet resultaat zijn de postcode, het huisnummer en de huisnummertoevoeging.
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdresInfo'
        '401':
          description: Access is unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblemDetails'
        '403':
          description: Access is forbidden.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PermissionsDeniedProblemDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundProblemDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - Adressen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Adres'
        description: Het adresobject dat gebruikt wordt om naar adresinformatie te zoeken.
      security:
        - oauth:
            - api:adressen:read
  /adressen/{bagNummeraanduidingId}:
    get:
      operationId: GetAdres
      summary: Adres info op basis van BAG Nummeraanduiding Id.
      description: |-
        De Notities zullen leeg blijven voor dit endpoint.
        Het adresobject zal gefilterd terugkomen, afhankelijk van het client_id dat gebruikt is voor de authenticatie.
      parameters:
        - name: bagNummeraanduidingId
          in: path
          required: true
          description: Een BAG Nummeraanduiding ID om een adres te specificeren.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdresInfo'
        '401':
          description: Access is unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblemDetails'
        '403':
          description: Access is forbidden.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PermissionsDeniedProblemDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundProblemDetails'
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      tags:
        - Adressen
      security:
        - oauth:
            - api:adressen:read
  /bestemmingsplannen/{bagNummeraanduidingId}:
