          nullable: true
          description: Potentieel verplicht voor de producttypen `modelwaardeDesktopTaxatie`, `desktopTaxatie` en `desktopTaxatiePlus` afhankelijk van de geldverstrekker- en accountconfiguratie.
        klantkenmerk:
          type: string
          minLength: 0
          maxLength: 100
          description: Vrij veld voor het opslaan van een klantkenmerk, zoals bijvoorbeeld een dossiernummer of andere interne referentie. Dit veld komt later weer terug in het `origineleInput` veld in het `waardering` object.
        heeftAflossingsvrijDeel:
          type: boolean
          nullable: true
          description: True als de lening een aflossingsvrij deel heeft. Potentieel verplicht voor de producttypen `modelwaardeDesktopTaxatie`, `desktopTaxatie` en `desktopTaxatiePlus` afhankelijk van de geldverstrekker- en accountconfiguratie.
        aflossingsvrijDeel:
          type: integer
          format: int32
          nullable: true
          description: |-
            De hoogte van het aflossingsvrije deel van het veld `hypotheekwaarde` van de lening. Alleen relevant als `heeftAflossingsvrijDeel` true is. Potentieel verplicht voor de producttypen `modelwaardeDesktopTaxatie`, `desktopTaxatie` en `desktopTaxatiePlus` afhankelijk van de geldverstrekker- en accountconfiguratie.
            In hele euros.
        verdieping:
          type: integer
          format: int32
          nullable: true
          description: Dit is de verdieping waarop de woning gelegen is (bel-etage), voor een eengezinswoning is dit de begane grond (=0). In de toekomst verplicht voor de producttypen `desktopTaxatie` en `desktopTaxatiePlus`.
        woonadresInBuitenland:
          type: boolean
          nullable: true
          description: Geeft aan of het woonadres van de aanvrager in het buitenland ligt. In de toekomst verplicht voor de producttypen `desktopTaxatie` en `desktopTaxatiePlus`.
        woonadresBagNummeraanduidingId:
          type: integer
          format: int64
          nullable: true
          description: Het BAG Id van het woonadres van de aanvrager. Alleen als woonadresInBuitenland false is. In de toekomst verplicht voor de producttypen `desktopTaxatie` en `desktopTaxatiePlus`.
        opdrachtgever:
          type: string
          nullable: true
          description: De volledige naam van de opdrachtgever. In de toekomst verplicht voor de producttypen `desktopTaxatie` en `desktopTaxatiePlus`.
    WaarderingOntwikkeling:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Id van de waardering.
        objectPrijsOntwikkeling:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van het gewaardeerde object.
        objectPrijsOntwikkelingPerVierkantemeter:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van het gewaardeerde object per vierkantemeter.
        buurtPrijsOntwikkeling:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van de buurt van het gewaardeerde object.
        buurtPrijsOntwikkelingPerVierkantemeter:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van de buurt van het gewaardeerde object per vierkantemeter.
        wijkPrijsOntwikkeling:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van de wijk van het gewaardeerde object.
        wijkPrijsOntwikkelingPerVierkantemeter:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van de wijk van het gewaardeerde object per vierkantemeter.
        gemeentePrijsOntwikkeling:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van de gemeente van het gewaardeerde object.
        gemeentePrijsOntwikkelingPerVierkantemeter:
          type: array
          items:
            $ref: '#/components/schemas/WaarderingOntwikkelingKwartaal'
          description: De prijsontwikkeling van de gemeente van het gewaardeerde object per vierkantemeter.
    WaarderingOntwikkelingKwartaal:
      type: object
      properties:
        kwartaal:
          $ref: '#/components/schemas/Kwartaal'
        waarde:
          type: integer
          format: int32
          description: In hele euros.
    WaarderingStatus:
      type: string
      enum:
        - onbekend
        - initialiseren
        - open
        - voltooid
        - opgewaardeerd
        - ongeldig
        - verlopen
        - error
        - inBehandeling
      description: |-
        | Waarde | Omschrijving |
        | --- | --- |
        | `onbekend` | Status onbekend. |
        | `initialiseren` | Deze waardering is geinitialiseerd maar moet nog bevestigd worden. |
        | `open` | Deze waardering is bevestigd maar moet nog uitgevoerd worden. |
        | `voltooid` | Deze waardering is voltooid. |
        | `opgewaardeerd` | Deze waardering is geupgrade naar een ander waardering type. |
        | `ongeldig` | Deze waardering is niet geldig, bijvoorbeeld omdat hij niet door de business rules is gekomen. |
        | `verlopen` | Deze waardering is verlopen omdat hij niet op tijd bevestigd is. |
        | `error` | Er is iets mis gegaan voor deze waardering. |
        | `inBehandeling` | Deze waardering is in behandeling door het systeem. |
      x-zero-based-enum: true
    WaarderingWebhookPayload:
      type: object
      required:
        - callbackName
        - eventId
        - timestamp
      properties:
        callbackName:
          type: string
          readOnly: true
        eventId:
          type: string
          format: uuid
          description: Uniek Id voor deze callback.
        timestamp:
          type: string
          format: date-time
          description: Het tijdstip van het event, in UTC.
          example: '2021-04-28T12:34:45Z'
        waarderingId:
          type: string
          format: uuid
          description: Het Id van de waardering waarop deze callback betrekking heeft.
        oldStatus:
          $ref: '#/components/schemas/WaarderingStatus'
        newStatus:
          $ref: '#/components/schemas/WaarderingStatus'
        isTest:
          type: boolean
          description: Geeft aan of de betreffende waardering aangevraagd is met een test token.
        externeReferentie:
          type: string
          nullable: true
          description: Dit is de externe referentie opgegeven bij de callback inschrijving of als dit een normale API waardering is waarvoor geen callback inschrijving was dit veld null.
      description: De payload van de webhooks voor de waarderingen.
    WaarderingZoekParameters:
      type: object
      required:
        - productType
        - bagNummeraanduidingId
      properties:
        aangemaakt:
          type: string
          format: date-time
          nullable: true
          description: De datum/tijd waarop de waardering is aangemaakt, in UTC.
          example: '2021-04-28T12:34:45Z'
        geldverstrekker:
          type: string
          nullable: true
          description: De naam van de geldverstrekker voor de waardering.
        productType:
          $ref: '#/components/schemas/ProductType'
        aanvraagdoel:
          allOf:
            - $ref: '#/components/schemas/Aanvraagdoel'
          nullable: true
        waarderingStatus:
          allOf:
            - $ref: '#/components/schemas/WaarderingStatus'
          nullable: true
        bagNummeraanduidingId:
          type: integer
          format: int64
          description: Verplicht.
    WebhookPayload:
      type: object
      required:
        - callbackName
        - eventId
        - timestamp
      properties:
        callbackName:
          type: string
          readOnly: true
        eventId:
          type: string
          format: uuid
          description: Uniek Id voor deze callback.
        timestamp:
          type: string
          format: date-time
          description: Het tijdstip van het event, in UTC.
          example: '2021-04-28T12:34:45Z'
      description: De base payload van de webhooks die verstuurd worden voor verschillende events.
    WoningType:
      type: string
      enum:
        - onbekend
        - vrijstaand
        - halfVrijstaand
        - hoekwoning
        - tussenwoning
        - galerijflat
        - portiekflat
        - maisonnette
        - bovenwoning
        - benedenwoning
      description: |-
        Woningtypes zoals gedefinieerd in het Calcasa-model.
        | Waarde | Omschrijving |
        | --- | --- |
        | `onbekend` | Onbekend woning type. |
        | `vrijstaand` | Vrijstaande woning. |
        | `halfVrijstaand` | Half-vrijstaande woning / twee-onder-een-kap. |
        | `hoekwoning` | Hoekwoning. |
        | `tussenwoning` | Tussenwoning. |
        | `galerijflat` | Galerijflat. |
        | `portiekflat` | Portiekflat. |
        | `maisonnette` | Maisonette. |
        | `bovenwoning` | Bovenwoning. |
        | `benedenwoning` | Benedenwoning. |
      x-zero-based-enum: true
  securitySchemes:
    oauth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://authentication.calcasa.nl/oauth2/v2.0/token
          scopes:
            api:adressen:read: ''
            api:bestemmingsplannen:read: ''
            api:bodem:read: ''
            api:buurt:read: ''
            api:callback:read: ''
            api:callback:write: ''
            api:configuratie:read: ''
            api:configuratie:write: ''
            api:facturen:read: ''
            api:file-set:inbound:read: ''
            api:file-set:inbound:write: ''
            api:file-set:outbound:read: ''
            api:file-set:outbound:write: ''
            api:fotos:read: ''
            api:funderingen:read: ''
            api:geldverstrekkers:read: ''
            api:rapporten:read: ''
            api:waarderingen:read: ''
            api:waarderingen:patch: ''
            api:waarderingen:ontwikkeling: ''
            api:waarderingen:create: ''
servers:
  - url: https://api.calcasa.nl/api/{apiVersion}
    description: Production
    variables:
      apiVersion:
        default: v1
        enum:
          - v1
  - url: https://api.staging.calcasa.nl/api/{apiVersion}
    description: Staging
    variables:
      apiVersion:
        default: v1
        enum:
          - v1
